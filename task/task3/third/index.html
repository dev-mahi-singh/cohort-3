<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <nav>
            <img src="./logo.png" alt="">
            <div class="nav-part1">
                <a href="#">About</a>
                <a href="#">Watch Now</a>
                <a href="#">Actors</a>
                <a href="#">Contact</a>
            </div>
            <i class="ri-menu-3-fill"></i>
        </nav>
        <div class="hero">
            <div class="left">
                <i id="star1" class="ri-shining-2-fill"></i>
                <i id="star2" class="ri-shining-2-fill"></i>
                <img src="./logo.png" alt="">
                <p>Action / Thriller / Drama Series directed by Dong-hyuk Hwang <br> Season 1:9 Episodes</p>
                <div class="btns">
                    <button><i class="ri-play-large-fill"></i> <span>Play Now</span></button>
                    <button><i class="ri-play-mini-line"></i> Watch Trailer</button>
                </div>
                <h1 class="game">Game</h1>
            </div>
            <div class="right">
                <p>Scroll</p>
                <img src="./guard.png" alt="">
                <div class="icons">
                    <i class="ri-twitter-line"></i>
                    <i class="ri-instagram-line"></i>
                    <i class="ri-facebook-line"></i>
                </div>
                <h1 class="squid">Squid</h1>
            </div>
        </div>
        <div class="card-container">
            <div class="card">
                <img src="./image1.jpg" alt="">
                <div class="play"><i class="ri-play-large-fill"></i></div>
            </div>
            <div class="card">
                <img src="./image2.jpg" alt="">
                <div class="play"><i class="ri-play-large-fill"></i></div>
            </div>
            <div class="card">
                <img src="./image3.jpg" alt="">
                <div class="play"><i class="ri-play-large-fill"></i></div>
            </div>
        </div>
    </main>
</body>

</html>
